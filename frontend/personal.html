<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人主页 - ltto的博客</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <header class="blog-header">
      <div class="logo">全栈空间 · 个人主页</div>
      <div class="header-actions">
        <a href="/" class="toggle-btn toggle-btn-outline" style="text-decoration:none;">← 返回博客</a>
        <a href="/library" class="toggle-btn toggle-btn-outline" style="text-decoration:none;">📚 资源库</a>
        <div id="auth-user-area" class="auth-user-area hidden">
          <span id="auth-welcome" class="auth-welcome"></span>
          <button id="logout-btn" class="toggle-btn toggle-btn-outline" type="button">
            退出登录
          </button>
        </div>
        <div id="auth-guest-area" class="auth-guest-area">
          <button id="login-open-btn" class="toggle-btn toggle-btn-outline" type="button">
            登录
          </button>
          <button id="register-open-btn" class="toggle-btn" type="button">注册</button>
        </div>
        <button id="theme-btn" class="toggle-btn" type="button">切换主题</button>
      </div>
    </header>

    <main class="blog-layout">
      <!-- 发布表单：仅博主可见 -->
      <section id="publish-section" class="publish-form-container hidden">
        <h3 class="publish-form-title">📝 发布个人动态</h3>
        <form id="personal-form">
          <div class="form-field">
            <div class="markdown-toolbar">
              <button type="button" class="md-btn" data-md="**" title="加粗"><b>B</b></button>
              <button type="button" class="md-btn" data-md="*" title="斜体"><i>I</i></button>
              <button type="button" class="md-btn" data-md="### " title="标题">H</button>
              <button type="button" class="md-btn" data-md="`" title="行内代码">&lt;/&gt;</button>
              <button type="button" class="md-btn" data-md="```" title="代码块">```</button>
              <button type="button" class="md-btn" data-md="> " title="引用">"</button>
              <button type="button" class="md-btn" data-md="- " title="列表">•</button>
              <button type="button" class="md-btn" data-md="[text](url)" title="链接">🔗</button>
              <button type="button" class="md-btn" data-md="$ " title="行内公式">f(x)</button>
              <button type="button" class="md-btn" data-md="$$\n\n$$" title="块级公式">∑</button>
              <span class="md-hint">支持 Markdown 和 LaTeX</span>
            </div>
            <textarea
              id="personal-content"
              placeholder="分享你的想法...&#10;&#10;支持 Markdown：**粗体** *斜体* `代码`&#10;支持 LaTeX：$E=mc^2$  $$\int_0^1 x dx$$"
              required
              rows="6"
              class="form-input form-textarea"
            ></textarea>
          </div>
          <div class="form-field">
            <label for="image-input">📷 图片（可选）</label>
            <input type="file" id="image-input" accept="image/*" multiple class="form-input" />
            <div id="image-preview" class="upload-preview"></div>
          </div>
          <div class="form-field">
            <label for="file-input">📎 文件（可选）</label>
            <input type="file" id="file-input" accept=".pdf,.txt,.zip,.rar,.doc,.docx,.xls,.xlsx,.ppt,.pptx" multiple class="form-input" />
            <div id="file-preview" class="upload-preview"></div>
          </div>
          <button type="submit" class="toggle-btn form-submit-btn">发布</button>
        </form>
      </section>

      <section id="login-prompt-section" class="login-prompt-container">
        <p>登录后即可发布个人内容</p>
        <button id="login-prompt-btn" class="toggle-btn" type="button">立即登录</button>
      </section>

      <section class="intro-section">
        <h1>👤 个人主页</h1>
        <p>这里记录了博主的个人动态与随笔</p>
      </section>

      <div id="personal-list" class="blog-grid"></div>
    </main>

    <footer class="blog-footer">
      <p>© 2026 全栈深耕计划. Powered by pure Vanilla JS.</p>
    </footer>

    <!-- 登录 / 注册弹窗 -->
    <div id="auth-modal" class="auth-modal-overlay hidden">
      <div class="auth-modal-content">
        <span id="auth-modal-close" class="custom-modal-close">×</span>
        <div class="auth-tabs">
          <button id="auth-tab-login" class="auth-tab active" type="button" data-tab="login">
            登录
          </button>
          <button id="auth-tab-register" class="auth-tab" type="button" data-tab="register">
            注册
          </button>
        </div>

        <form id="login-form" class="auth-form">
          <div class="form-field">
            <label for="login-username">用户名</label>
            <input
              type="text"
              id="login-username"
              placeholder="请输入用户名"
              required
              minlength="3"
              maxlength="20"
              class="form-input"
            />
          </div>
          <div class="form-field">
            <label for="login-password">密码</label>
            <input
              type="password"
              id="login-password"
              placeholder="请输入密码"
              required
              minlength="6"
              class="form-input"
            />
          </div>
          <p id="login-error" class="auth-error hidden"></p>
          <button type="submit" class="toggle-btn form-submit-btn">登录</button>
        </form>

        <form id="register-form" class="auth-form hidden">
          <div class="form-field">
            <label for="register-username">用户名</label>
            <input
              type="text"
              id="register-username"
              placeholder="3-20 个字符"
              required
              minlength="3"
              maxlength="20"
              class="form-input"
            />
          </div>
          <div class="form-field">
            <label for="register-password">密码</label>
            <input
              type="password"
              id="register-password"
              placeholder="至少 6 位"
              required
              minlength="6"
              class="form-input"
            />
          </div>
          <p id="register-error" class="auth-error hidden"></p>
          <button type="submit" class="toggle-btn form-submit-btn">注册</button>
        </form>
      </div>
    </div>

    <script src="personal.js?v=3"></script>
  </body>
</html>
