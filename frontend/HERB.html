<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>中药识别 - ltto的博客</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <header class="blog-header">
      <div class="logo">🌿 中药识别</div>
      <div class="header-actions">
        <a href="/" class="toggle-btn toggle-btn-outline" style="text-decoration:none;">← 博客</a>
        <a href="/personal" class="toggle-btn toggle-btn-outline" style="text-decoration:none;">👤 个人主页</a>
        <a href="/library" class="toggle-btn toggle-btn-outline" style="text-decoration:none;">📚 资源库</a>
        <div id="auth-user-area" class="auth-user-area hidden">
          <span id="auth-welcome" class="auth-welcome"></span>
          <button id="logout-btn" class="toggle-btn toggle-btn-outline" type="button">
            退出登录
          </button>
        </div>
        <div id="auth-guest-area" class="auth-guest-area">
          <button id="login-open-btn" class="toggle-btn toggle-btn-outline" type="button">
            登录
          </button>
          <button id="register-open-btn" class="toggle-btn" type="button">注册</button>
        </div>
        <button id="theme-btn" class="toggle-btn" type="button">切换主题</button>
      </div>
    </header>

    <main class="blog-layout">
      <section class="intro-section">
        <h1>🌿 中药饮片智能识别</h1>
        <p>基于 MobileNetV3 深度学习的 20 种常见中药材图片分类识别，准确率 94.3%</p>
      </section>

      <!-- 上传与识别区 -->
      <section class="publish-form-container">
        <h3 class="publish-form-title">📷 上传中药图片</h3>
        <div class="form-field">
          <label for="herb-file" style="font-weight:500; margin-bottom:6px; display:block;">选择图片文件</label>
          <input type="file" id="herb-file" accept="image/*" class="form-input" />
        </div>
        <div class="form-field">
          <label for="herb-model" style="font-weight:500; margin-bottom:6px; display:block;">🧠 推理模型</label>
          <select id="herb-model" class="form-input">
            <option value="MobileNetV3-Large">🥇 MobileNetV3-Large（推荐 · 94.3% · 17MB）</option>
            <option value="EfficientNet-B3">🥈 EfficientNet-B3（93.7% · 42MB）</option>
            <option value="ResNet50">🥉 ResNet50（91.7% · 91MB）</option>
          </select>
        </div>
        <div id="herb-drop-zone" class="herb-drop-zone">
          <div id="herb-drop-placeholder" class="herb-drop-placeholder">
            <span class="herb-drop-icon">🖼️</span>
            <span>拖拽中药图片到此处</span>
            <span style="font-size:12px;color:#94a3b8;">或点击上方「选择图片文件」</span>
          </div>
          <img id="preview-img" src="" alt="预览" class="hidden" />
        </div>
        <button id="predict-btn" class="toggle-btn form-submit-btn" type="button">
          🔍 开始识别
        </button>
        <div id="loading-area" class="hidden" style="text-align:center; padding:20px;">
          <div class="herb-spinner"></div>
          <p style="margin-top:12px; color:#64748b;">AI 正在分析识别中，请稍候...</p>
        </div>
      </section>

      <!-- 识别结果区 -->
      <section id="result-section" class="publish-form-container hidden">
        <h3 class="publish-form-title">📊 识别结果</h3>
        <div id="result-content"></div>
      </section>

      <!-- 支持的中药种类 -->
      <section class="publish-form-container">
        <h3 class="publish-form-title">📋 支持识别的中药种类（20 种）</h3>
        <div id="class-grid" class="herb-class-grid"></div>
      </section>
    </main>

    <footer class="blog-footer">
      <p>© 2026 Ltto的乌托邦 · 中药识别由 PyTorch 三模型驱动（MobileNetV3 / EfficientNet / ResNet50）</p>
    </footer>

    <!-- 登录 / 注册弹窗 -->
    <div id="auth-modal" class="auth-modal-overlay hidden">
      <div class="auth-modal-content">
        <span id="auth-modal-close" class="custom-modal-close">×</span>
        <div class="auth-tabs">
          <button id="auth-tab-login" class="auth-tab active" type="button" data-tab="login">
            登录
          </button>
          <button id="auth-tab-register" class="auth-tab" type="button" data-tab="register">
            注册
          </button>
        </div>

        <form id="login-form" class="auth-form">
          <div class="form-field">
            <label for="login-username">用户名</label>
            <input
              type="text"
              id="login-username"
              placeholder="请输入用户名"
              required
              minlength="3"
              maxlength="20"
              class="form-input"
            />
          </div>
          <div class="form-field">
            <label for="login-password">密码</label>
            <input
              type="password"
              id="login-password"
              placeholder="请输入密码"
              required
              minlength="6"
              class="form-input"
            />
          </div>
          <p id="login-error" class="auth-error hidden"></p>
          <button type="submit" class="toggle-btn form-submit-btn">登录</button>
        </form>

        <form id="register-form" class="auth-form hidden">
          <div class="form-field">
            <label for="register-username">用户名</label>
            <input
              type="text"
              id="register-username"
              placeholder="3-20 个字符"
              required
              minlength="3"
              maxlength="20"
              class="form-input"
            />
          </div>
          <div class="form-field">
            <label for="register-password">密码</label>
            <input
              type="password"
              id="register-password"
              placeholder="至少 6 位"
              required
              minlength="6"
              class="form-input"
            />
          </div>
          <p id="register-error" class="auth-error hidden"></p>
          <button type="submit" class="toggle-btn form-submit-btn">注册</button>
        </form>
      </div>
    </div>

    <script src="herb.js?v=1"></script>
  </body>
</html>
