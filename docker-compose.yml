services:
  blog:
    # ① 从当前目录的 Dockerfile 构建镜像
    build: .

    # ② 端口映射：宿主机:容器
    #    访问 http://localhost:8000 就能看到你的博客
    ports:
      - "8000:8000"

    # ③ 卷挂载：把宿主机文件/目录「映射」进容器
    #    容器删了数据还在；修改.blog.db容器内外同步
    volumes:
      - ./blog.db:/app/blog.db      # SQLite 数据库持久化
      - ./uploads:/app/uploads      # 用户上传文件持久化
      - ./backend/herb_model_data:/app/backend/herb_model_data  # AI 模型持久化

    # ④ 环境变量（不走 .env 文件了，直接写这里）
    environment:
      - BLOG_OWNER_USERNAME=Ltto123

    # ⑤ 容器挂了自动重启
    restart: unless-stopped
